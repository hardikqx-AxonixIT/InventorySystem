<div class="shell-layout">
  <!-- Mobile Overlay -->
  <div class="sidebar-overlay" *ngIf="menuOpen" (click)="toggleMenu()"></div>

  <aside class="sidebar-panel" [class.mobile-open]="menuOpen">
    <div class="brand-block" routerLink="/dashboard" (click)="closeMenuOnNavigate()" style="cursor: pointer;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <p class="eyebrow">Axonix ERP</p>
          <h1>Inventory Suite</h1>
        </div>
        <button class="menu-close-btn" (click)="$event.stopPropagation(); toggleMenu()">✕</button>
      </div>
    </div>

    <nav class="nav-group">
      <div class="nav-label">General</div>
      <a
        *ngFor="let link of quickLinks"
        [routerLink]="link.route"
        routerLinkActive="active-link"
        class="nav-link"
        (click)="closeMenuOnNavigate()">
        <span class="icon-chip">{{ link.icon }}</span>
        <span>{{ navLabel(link.label) }}</span>
      </a>

      <!-- Renamed 'Modules' to 'Workspace' and removed duplicates like Sales/Purchase -->
      <div class="nav-label">ERP Suite</div>
      <ng-container *ngFor="let module of moduleLinks">
        <a
          *ngIf="module.key !== 'audit-logs' && module.key !== 'sales' && module.key !== 'purchase' && module.key !== 'dashboard' && module.key !== 'masters' && module.key !== 'mobile'"
          [routerLink]="'/' + module.key"
          routerLinkActive="active-link"
          class="nav-link"
          (click)="closeMenuOnNavigate()">
          <span class="icon-chip">{{ moduleIcon(module.key) }}</span>
          <span>{{ moduleLabel(module.key, module.title) }}</span>
        </a>
      </ng-container>

      <div class="nav-label">Master & Logs</div>
      <a
        routerLink="/masters"
        routerLinkActive="active-link"
        class="nav-link"
        (click)="closeMenuOnNavigate()">
        <span class="icon-chip">{{ moduleIcon('masters') }}</span>
        <span>Master Setup</span>
      </a>
      <a
        routerLink="/audit-logs"
        routerLinkActive="active-link"
        class="nav-link"
        (click)="closeMenuOnNavigate()">
        <span class="icon-chip">{{ moduleIcon('audit-logs') }}</span>
        <span>History Log</span>
      </a>
    </nav>
  </aside>

  <main class="main-panel">
    <header class="top-header">
      <div class="mobile-toggle-zone">
        <button class="menu-toggle-pill" type="button" (click)="toggleMenu()">
          <span class="burger-icon">☰</span>
          <span class="menu-text">Menu</span>
        </button>
      </div>

      <div class="header-brand-mobile">Axonix Suite</div>

      <div class="user-corner">
        <div class="user-meta">
          <span class="u-name">Admin User</span>
          <span class="u-role">Super Admin</span>
        </div>
        <button class="btn logout-pill" (click)="logout()">
          <span>Logout</span>
          <span class="logout-icon">🚪</span>
        </button>
      </div>
    </header>

    <div class="scroll-content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
