<div class="shell-layout" [class.sidebar-collapsed]="sidebarCollapsed">
  <div class="sidebar-overlay" *ngIf="menuOpen" (click)="toggleMenu()"></div>

  <aside class="sidebar-panel" [class.mobile-open]="menuOpen" [class.collapsed]="sidebarCollapsed">
    <div class="brand-block" routerLink="/dashboard" (click)="closeMenuOnNavigate()" style="cursor: pointer;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <p class="eyebrow">Axonix ERP</p>
          <h1 *ngIf="!sidebarCollapsed">Inventory Suite</h1>
        </div>
        <button class="menu-close-btn" (click)="$event.stopPropagation(); toggleMenu()">&#10006;</button>
      </div>
    </div>

    <nav class="nav-group">
      <div class="nav-label" *ngIf="!sidebarCollapsed">General</div>
      <a
        *ngFor="let link of quickLinks"
        [routerLink]="link.route"
        routerLinkActive="active-link"
        class="nav-link"
        (click)="closeMenuOnNavigate()"
        [title]="navLabel(link.label)">
        <span class="icon-chip" [innerHTML]="link.icon"></span>
        <span *ngIf="!sidebarCollapsed">{{ navLabel(link.label) }}</span>
      </a>

      <div class="nav-label" *ngIf="!sidebarCollapsed">ERP Suite</div>
      <ng-container *ngFor="let module of moduleLinks">
        <a
          *ngIf="module.key !== 'audit-logs' && module.key !== 'sales' && module.key !== 'purchase' && module.key !== 'dashboard' && module.key !== 'masters' && module.key !== 'mobile'"
          [routerLink]="'/' + module.key"
          routerLinkActive="active-link"
          class="nav-link"
          (click)="closeMenuOnNavigate()"
          [title]="moduleLabel(module.key, module.title)">
          <span class="icon-chip" [innerHTML]="moduleIcon(module.key)"></span>
          <span *ngIf="!sidebarCollapsed">{{ moduleLabel(module.key, module.title) }}</span>
        </a>
      </ng-container>

      <div class="nav-label" *ngIf="!sidebarCollapsed">Master & Logs</div>
      <a
        routerLink="/masters/products"
        routerLinkActive="active-link"
        class="nav-link"
        (click)="closeMenuOnNavigate()"
        title="Products">
        <span class="icon-chip">&#128230;</span>
        <span *ngIf="!sidebarCollapsed">Products</span>
      </a>
      <a
        routerLink="/masters/customers"
        routerLinkActive="active-link"
        class="nav-link"
        (click)="closeMenuOnNavigate()"
        title="Customers">
        <span class="icon-chip">&#128101;</span>
        <span *ngIf="!sidebarCollapsed">Customers</span>
      </a>
      <a
        routerLink="/masters"
        routerLinkActive="active-link"
        class="nav-link"
        (click)="closeMenuOnNavigate()"
        title="Other Masters">
        <span class="icon-chip" [innerHTML]="moduleIcon('masters')"></span>
        <span *ngIf="!sidebarCollapsed">Other Masters</span>
      </a>
      <a
        routerLink="/audit-logs"
        routerLinkActive="active-link"
        class="nav-link"
        (click)="closeMenuOnNavigate()"
        title="History Log">
        <span class="icon-chip" [innerHTML]="moduleIcon('audit-logs')"></span>
        <span *ngIf="!sidebarCollapsed">History Log</span>
      </a>
    </nav>
  </aside>

  <main class="main-panel">
    <header class="top-header">
      <div class="mobile-toggle-zone">
        <button class="menu-toggle-pill" type="button" (click)="toggleMenu()">
          <span class="burger-icon">&#9776;</span>
          <span class="menu-text">Menu</span>
        </button>
      </div>

      <div class="desktop-toggle-zone">
        <button class="menu-toggle-pill" type="button" (click)="toggleSidebarCollapse()" title="Hide/Show menu">
          <span class="burger-icon" *ngIf="sidebarCollapsed">&#9654;</span>
          <span class="burger-icon" *ngIf="!sidebarCollapsed">&#9664;</span>
        </button>
      </div>

      <div class="header-brand-mobile">Axonix Suite</div>

      <div class="user-corner">
        <div class="user-meta">
          <span class="u-name">Admin User</span>
          <span class="u-role">Super Admin</span>
        </div>
        <button class="btn logout-pill" (click)="logout()" title="Logout">
          <span>&#128682;</span>
        </button>
      </div>
    </header>

    <div class="scroll-content">
      <router-outlet></router-outlet>
      <footer class="shell-footer">
        <a routerLink="/privacy">Privacy</a>
        <span class="sep">·</span>
        <a routerLink="/terms">Terms</a>
        <span class="sep">·</span>
        <a routerLink="/gst-disclaimer">GST disclaimer</a>
        <span class="sep">·</span>
        <a routerLink="/onboarding">Setup guide</a>
      </footer>
    </div>
  </main>
</div>
