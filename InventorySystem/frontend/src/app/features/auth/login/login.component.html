<div class="login-container" style="display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px;color:#fff;">
  <div class="login-box" style="padding:40px;border-radius:24px;background-color:rgba(9,26,39,0.88);box-shadow:0 20px 50px rgba(0,0,0,0.35);width:360px;border:1px solid rgba(160,196,214,0.14);">
    <p style="text-transform:uppercase;letter-spacing:.12em;font-size:.72rem;color:#8fb5c7;margin-bottom:8px;">Axonix ERP</p>
    <h2 style="margin-bottom:10px;font-family:'Space Grotesk',sans-serif;">Inventory Login</h2>
    <p style="margin-bottom:20px;color:#bfd3de;line-height:1.6;">Use the seeded demo admin or your registered credentials to enter the ERP shell.</p>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group" style="margin-bottom:15px;">
        <label style="display:block;margin-bottom:5px;">Email</label>
        <input type="email" formControlName="email" class="form-control" style="width:100%;padding:12px;border-radius:12px;border:1px solid #254555;background:#102633;color:#fff;" />
      </div>
      <div class="form-group" style="margin-bottom:15px;">
        <label style="display:block;margin-bottom:5px;">Password</label>
        <input type="password" formControlName="password" class="form-control" style="width:100%;padding:12px;border-radius:12px;border:1px solid #254555;background:#102633;color:#fff;" />
      </div>
      <div *ngIf="error" class="error-text" style="color:#ff5252;margin-bottom:10px;">{{ error }}</div>
      <button type="submit" [disabled]="!loginForm.valid" class="btn btn-primary" style="width:100%;margin-top:10px;">Login</button>
    </form>

    <div style="margin-top:18px;padding:16px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(160,196,214,.1);">
      <p style="font-size:.78rem;text-transform:uppercase;letter-spacing:.1em;color:#8fb5c7;">Demo credentials</p>
      <p style="margin-top:8px;">admin@axonix.local</p>
      <p style="margin-top:4px;">Admin@123</p>
      <button type="button" class="btn btn-secondary" (click)="useDemoCredentials()" style="margin-top:12px;width:100%;">Fill demo login</button>
    </div>
  </div>
</div>
