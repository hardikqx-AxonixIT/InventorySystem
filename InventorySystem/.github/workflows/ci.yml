name: ci

on:
  push:
    branches: [ "main", "master", "develop", "codex/**" ]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'
      - name: Restore
        run: dotnet restore InventorySystem.sln
      - name: Build
        run: dotnet build InventorySystem.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test InventorySystem.sln --configuration Release --no-build --verbosity minimal

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Install Chromium for Karma
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
      - name: Unit tests
        env:
          CHROME_BIN: /usr/bin/chromium-browser
        run: npm run test:ci